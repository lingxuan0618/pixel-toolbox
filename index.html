<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon(用你的 logo)-->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- SEO / 描述 -->
    <title>Pixel Toolbox · 像素風線上工具箱</title>
    <meta
      name="description"
      content="像素風線上工具箱|PDF 簽名、合併、拆分、浮水印、HEIC 轉檔、圖片壓縮、QR Code…全部在你的瀏覽器處理,不上傳。"
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pixel Toolbox · 像素風線上工具箱" />
    <meta
      property="og:description"
      content="10+ 個 PDF / 圖片 / QR Code 工具,通通在瀏覽器處理,檔案永遠不離開你的裝置。"
    />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:locale" content="zh_TW" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Pixel Toolbox" />
    <meta
      name="twitter:description"
      content="像素風線上工具箱 · 不上傳檔案"
    />
    <meta name="twitter:image" content="/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

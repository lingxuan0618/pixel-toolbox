<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Pixel Toolbox</title>
    <script>
      const base = '/pixel-toolbox/'
      const path = location.pathname.startsWith(base) ? location.pathname.slice(base.length - 1) : location.pathname
      sessionStorage.setItem('ptb-redirect', path + location.search + location.hash)
      location.replace('/pixel-toolbox/')
    </script>
  </head>
  <body></body>
</html>
